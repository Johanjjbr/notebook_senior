name: notebook_senior
description: "App de notas, tareas y recordatorios personal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.11.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  supabase_flutter: ^2.8.0
  go_router: ^14.8.0
  provider: ^6.1.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.4.0
  shimmer: ^3.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
